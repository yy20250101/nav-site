<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人导航网站</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>我的导航</h1>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索网站...">
                <button id="search-btn"><i class="bi bi-search"></i></button>
            </div>
        </header>
        
        <main>
            <div class="category" id="common">
                <h2>常用网站</h2>
                <div class="sites-container">
                    <a href="https://www.google.com" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-google"></i></div>
                        <div class="site-name">Google</div>
                    </a>
                    <a href="https://www.github.com" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-github"></i></div>
                        <div class="site-name">GitHub</div>
                    </a>
                    <a href="https://www.youtube.com" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-youtube"></i></div>
                        <div class="site-name">YouTube</div>
                    </a>
                </div>
            </div>

            <div class="category" id="tools">
                <h2>工具</h2>
                <div class="sites-container">
                    <a href="https://translate.google.com" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-translate"></i></div>
                        <div class="site-name">谷歌翻译</div>
                    </a>
                    <a href="https://www.notion.so" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-journal-text"></i></div>
                        <div class="site-name">Notion</div>
                    </a>
                    <a href="https://chat.openai.com" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-chat-dots"></i></div>
                        <div class="site-name">ChatGPT</div>
                    </a>
                </div>
            </div>

            <div class="category" id="learning">
                <h2>学习资源</h2>
                <div class="sites-container">
                    <a href="https://www.coursera.org" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-book"></i></div>
                        <div class="site-name">Coursera</div>
                    </a>
                    <a href="https://www.udemy.com" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-mortarboard"></i></div>
                        <div class="site-name">Udemy</div>
                    </a>
                    <a href="https://developer.mozilla.org" class="site-card" target="_blank">
                        <div class="site-icon"><i class="bi bi-code-slash"></i></div>
                        <div class="site-name">MDN</div>
                    </a>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2023 个人导航网站 | <a href="https://github.com/yourusername/nav-site" target="_blank">GitHub</a></p>
            <button id="add-site-btn">添加网站</button>
        </footer>
    </div>

    <div class="modal" id="add-site-modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>添加新网站</h2>
            <form id="add-site-form">
                <div class="form-group">
                    <label for="site-name">网站名称</label>
                    <input type="text" id="site-name" required>
                </div>
                <div class="form-group">
                    <label for="site-url">网站链接</label>
                    <input type="url" id="site-url" required>
                </div>
                <div class="form-group">
                    <label for="site-category">分类</label>
                    <select id="site-category">
                        <option value="common">常用网站</option>
                        <option value="tools">工具</option>
                        <option value="learning">学习资源</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="site-icon">图标 (Bootstrap Icons 类名)</label>
                    <input type="text" id="site-icon" value="bi-globe">
                </div>
                <button type="submit">保存</button>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
